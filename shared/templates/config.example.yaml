config_version: 1
providers:
  mock:
    type: mock
    enabled: true
  ollama:
    type: local_cli
    enabled: true
    command: ollama
    base_url: http://127.0.0.1:11434
    timeout_seconds: 600
    run_args:
      - run
      - "{model}"
    stdin_prompt: true
  openai:
    type: online_openai_compatible
    enabled: false
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
  codex:
    type: codex_cli
    capability: review
    enabled: false
    command: codex
    profile: twr-reviewer
    codex_home: ~/.codex/twr-reviewer
    timeout_seconds: 900
    session:
      start_mode: fresh
      retention: persisted
    subagents:
      required: true
      count: 1
      agent: twr_story_reviewer
  codex_writer:
    type: codex_cli
    capability: writing
    enabled: false
    command: codex
    profile: twr-writer
    codex_home: ~/.codex/twr-reviewer
    timeout_seconds: 900
    session:
      start_mode: fresh
      retention: ephemeral
model_profiles:
  mock_writer:
    provider: mock
    model: mock-writer
    intelligence: medium
    context_window: 32000
  local_writer:
    provider: ollama
    model: qwen3:14b
    intelligence: medium
    context_window: 32000
  online_writer:
    provider: openai
    model: gpt-5.5
    intelligence: very_high
    context_window: 128000
  codex_reviewer:
    provider: codex
    context_window: 128000
  codex_writer:
    provider: codex_writer
    context_window: 128000
fallback_chains:
  mock_first:
    - mock_writer
  local_first:
    - local_writer
  local_first_with_online_fallback:
    - local_writer
    - online_writer
  local_first_with_codex_fallback:
    - local_writer
    - codex_writer
  online_allowed:
    - local_writer
    - online_writer
  online_only_high_accuracy:
    - online_writer
  codex_review:
    - codex_reviewer
writing_stages:
  scene_planning:
    intelligence: high
    creativity: medium
    provider_group: local_first_with_codex_fallback
  scene_skeleton:
    intelligence: high
    creativity: medium
    provider_group: local_first_with_codex_fallback
  chapter_generation:
    intelligence: high
    creativity: high
    provider_group: local_first_with_codex_fallback
  narrative_deepening:
    intelligence: high
    creativity: high
    provider_group: local_first_with_codex_fallback
  de_duplication:
    intelligence: medium
    creativity: low
    provider_group: local_first_with_codex_fallback
  prose_polish:
    intelligence: medium
    creativity: medium
    provider_group: local_first_with_codex_fallback
  chapter_revision:
    intelligence: high
    creativity: medium
    provider_group: local_first_with_codex_fallback
  handover_update:
    intelligence: medium
    creativity: low
    provider_group: local_first_with_codex_fallback
  issue_explanation:
    intelligence: high
    creativity: low
    provider_group: local_first_with_codex_fallback
writing_policy:
  codex_intelligence_map:
    low: {model: gpt-5.6-terra, reasoning_effort: high}
    medium: {model: gpt-5.6-terra, reasoning_effort: high}
    high: {model: gpt-5.6-terra, reasoning_effort: high}
    very_high: {model: gpt-5.6-terra, reasoning_effort: high}
review_policy:
  codex_intelligence_map:
    low: {model: gpt-5.6-sol, reasoning_effort: high}
    medium: {model: gpt-5.6-sol, reasoning_effort: high}
    high: {model: gpt-5.6-sol, reasoning_effort: high}
    very_high: {model: gpt-5.6-sol, reasoning_effort: high}
  rereview_after_writer_explanation:
    minimum_intelligence: very_high
    provider_group: codex_review
story_tools:
  provider_group: online_only_high_accuracy
  allow_local: false
