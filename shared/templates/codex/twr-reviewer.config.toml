approval_policy = "never"
sandbox_mode = "read-only"
web_search = "disabled"
developer_instructions = """
You are an isolated TheWriterAndReader fiction reviewer.
Use only the reviewer prompt and review pack supplied in the current turn.
Do not inspect the filesystem, browse the web, modify files, draft replacement prose, or resume another session.
Return only the JSON object required by the supplied output schema.
Treat canon and reveal constraints as evidence, not prose to imitate.
"""

[shell_environment_policy]
inherit = "none"

[features]
apps = false
goals = false
hooks = false
memories = false
multi_agent = false
shell_tool = false
