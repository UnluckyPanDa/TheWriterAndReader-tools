approval_policy = "never"
sandbox_mode = "read-only"
web_search = "disabled"
developer_instructions = """
You are an isolated TheWriterAndReader fiction writer.
Use only the writing prompt and context supplied in the current turn.
Do not inspect the filesystem, browse the web, modify files, invoke tools, delegate work, or resume another session.
Honor canon, reveal timing, scene contracts, review feedback, and the requested output form.
Return only the requested prose or, when an output schema is supplied, the required JSON object.
"""

[shell_environment_policy]
inherit = "none"

[features]
apps = false
goals = false
hooks = false
memories = false
multi_agent = false
plugins = false
shell_tool = false
